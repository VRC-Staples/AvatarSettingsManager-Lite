---
name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions: {}

jobs:
  identity-guard:
    name: Commit Identity Guard
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify commit metadata and trailers
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          chmod +x Tools/ci/verify-commit-identity.sh
          Tools/ci/verify-commit-identity.sh "$BASE_SHA" "$HEAD_SHA"

  compatibility-guard:
    name: Compatibility Contract Guard
    runs-on: ubuntu-latest
    needs: [identity-guard]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Evaluate compatibility contract (warn-only)
        id: evaluate-compatibility
        run: |
          set -euo pipefail
          python3 Tools/ci/evaluate-compatibility-contract.py \
            --mode ci \
            --contract .planning/compatibility.contract.json \
            --output-json /tmp/compatibility-contract-report.json \
            > /tmp/compatibility-contract-summary.md

      - name: Append compatibility summary
        if: always()
        run: |
          set -euo pipefail
          if [ -f /tmp/compatibility-contract-summary.md ]; then
            cat /tmp/compatibility-contract-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Compatibility Contract Evaluation" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Evaluator did not produce a markdown summary." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload compatibility report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compatibility-contract-report
          path: /tmp/compatibility-contract-report.json
          if-no-files-found: warn

  lint:
    name: Super-Linter
    runs-on: ubuntu-latest
    needs: [identity-guard]

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Super-Linter
        uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          VALIDATE_ALL_CODEBASE: >-
            ${{ github.event_name != 'pull_request' }}

          FILTER_REGEX_INCLUDE: >-
            .*(\.github|Packages/com\.staples\.asm-lite)/.*

          VALIDATE_MARKDOWN: true
          VALIDATE_JSON: true
          VALIDATE_YAML: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_GITLEAKS: true

          LINTER_RULES_PATH: .
          YAML_CONFIG_FILE: .yamllint.yml

          SHELLCHECK_OPTS: >-
            --exclude=SC2086 --exclude=SC2129

  compile:
    name: "C# Compile (Unity 2022.3.22f1)"
    runs-on: ubuntu-latest
    needs: [identity-guard]

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "8.0.x"

      - name: Generate .csproj files
        env:
          UNITY_PATH: Tools/ci/unity-project/UnityManaged
          PACKAGE_PATH: Packages/com.staples.asm-lite
          CI_PROJECT_PATH: Tools/ci/unity-project
        run: |
          chmod +x Tools/ci/generate-csproj.sh
          Tools/ci/generate-csproj.sh

      - name: Compile assemblies
        run: |
          set +e
          cat Tools/ci/unity-project/ASMLite.Runtime.csproj > /tmp/runtime.csproj.txt
          dotnet build Tools/ci/unity-project/ASMLite.Runtime.csproj --nologo -v diagnostic > /tmp/runtime-build.txt 2>&1
          RT=$?
          echo "Runtime exit: $RT" >> /tmp/runtime-build.txt
          dotnet build Tools/ci/unity-project/ASMLite.Editor.csproj --nologo -v diagnostic > /tmp/editor-build.txt 2>&1
          ET=$?
          echo "Editor exit: $ET" >> /tmp/editor-build.txt
          # Print tail of each for annotations
          tail -50 /tmp/runtime-build.txt
          tail -50 /tmp/editor-build.txt
          exit $(( RT | ET ))

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs
          path: |
            /tmp/runtime.csproj.txt
            /tmp/runtime-build.txt
            /tmp/editor-build.txt

  test:
    name: EditMode Tests
    runs-on: ubuntu-latest
    needs: [identity-guard]
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Cache Unity Library
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: Tools/ci/unity-project/Library
          key: Library-${{ hashFiles('Tools/ci/unity-project/Packages/**', 'Tools/ci/unity-project/ProjectSettings/**') }}
          restore-keys: Library-
      - name: Run EditMode Tests
        shell: bash
        env:
          UNITY_LICENSE_SECRET: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p artifacts CodeCoverage

          if [ -z "${UNITY_LICENSE_SECRET:-}" ]; then
            echo "::error::UNITY_LICENSE is missing."
            exit 1
          fi
          if [ -z "${UNITY_EMAIL:-}" ]; then
            echo "::error::UNITY_EMAIL is missing."
            exit 1
          fi
          if [ -z "${UNITY_PASSWORD:-}" ]; then
            echo "::error::UNITY_PASSWORD is missing."
            exit 1
          fi

          UNITY_VERSION="$(awk -F': ' '/^m_EditorVersion:/ { print $2; exit }' \
            Tools/ci/unity-project/ProjectSettings/ProjectVersion.txt | tr -d '\r\n')"
          if [ -z "${UNITY_VERSION:-}" ]; then
            echo "::error::Failed to read Unity version from ProjectVersion.txt"
            exit 1
          fi

          UNITY_IMAGE="unityci/editor:ubuntu-${UNITY_VERSION}-linux-il2cpp-3"
          printf 'Using Unity image %q\n' "${UNITY_IMAGE}"

          # Derive serial from the .ulf file (machine-independent — only the
          # DeveloperData base64 segment is used, not machine bindings).
          SERIAL_FILE="$(mktemp)"
          python - <<'PY' "$SERIAL_FILE"
          import base64, os, sys

          serial_path = sys.argv[1]
          secret = os.environ.get("UNITY_LICENSE_SECRET", "")

          def looks_like_ulf(v):
              return '<DeveloperData Value="' in v and '/>' in v

          norm = secret
          if not looks_like_ulf(secret):
              try:
                  dec = base64.b64decode(secret, validate=True).decode("utf-8")
              except Exception:
                  dec = ""
              if looks_like_ulf(dec):
                  norm = dec
                  print("::warning::UNITY_LICENSE was base64-decoded at runtime.")

          if not looks_like_ulf(norm):
              print("::error::UNITY_LICENSE is not a valid .ulf file.", file=sys.stderr)
              sys.exit(1)

          start_key = '<DeveloperData Value="'
          end_key = '"/>'
          s = norm.find(start_key)
          if s < 0:
              print("::error::Missing DeveloperData entry.", file=sys.stderr)
              sys.exit(1)
          s += len(start_key)
          e = norm.find(end_key, s)
          if e < 0:
              print("::error::Missing DeveloperData closing marker.", file=sys.stderr)
              sys.exit(1)

          serial = base64.b64decode(norm[s:e]).decode("latin1")[4:]
          if not serial:
              print("::error::Failed to derive serial.", file=sys.stderr)
              sys.exit(1)

          with open(serial_path, "w", encoding="utf-8") as fh:
              fh.write(serial)
          PY

          UNITY_SERIAL="$(tr -d '\r\n' < "${SERIAL_FILE}")"
          rm -f "${SERIAL_FILE}"

          if [ -z "${UNITY_SERIAL:-}" ]; then
            echo "::error::Failed to derive UNITY_SERIAL from UNITY_LICENSE"
            exit 1
          fi
          echo "::add-mask::${UNITY_SERIAL}"

          ASMLITE_BATCH_RUNS_JSON="$(python - <<'PY'
          import json

          core_fixture_patterns = [
              r"^ASMLite\.Tests\.Editor\.ASMLiteAssetPathsTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteBuilderTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteComponentTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteCustomizationScaffoldTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteInstallPathWiringTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteParameterDiscoveryTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteToggleBrokerTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteWindowActionHierarchyTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteWindowCustomizationTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteWindowNamingGroupingTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteWindowRiskAffordanceTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteWindowStatusPanelTests(?:\.|$)",
              r"^ASMLite\.Tests\.Editor\.ASMLiteWindowTerminologyTests(?:\.|$)",
          ]

          payload = {
              "runs": [
                  {
                      "name": "editmode-core",
                      "resultFile": "editmode-core-results.xml",
                      "filters": [
                          {
                              "groupNames": core_fixture_patterns,
                          },
                          {
                              "testNames": [
                                  "ASMLite.Tests.Editor.ASMLitePrefabWiringTests.W02_HasStalePrmsEntry_DetectsLegacyPrmsNames_AndIgnoresOtherNames",
                              ],
                          },
                      ],
                  },
                  {
                      "name": "editmode-integration",
                      "resultFile": "editmode-integration-results.xml",
                      "categoryNames": ["Integration"],
                  },
              ]
          }

          print(json.dumps(payload, separators=(",", ":")))
          PY
          )"
          export ASMLITE_BATCH_RUNS_JSON
          export ASMLITE_BATCH_RESULTS_DIR=/github/workspace/artifacts

          # Write the inner script to a temp file to avoid quoting issues
          # and shellcheck false-positives on the docker run string.
          RUNNER_SCRIPT="$(mktemp /tmp/unity-runner.XXXXXX.sh)"
          cat > "${RUNNER_SCRIPT}" <<'RUNNER'
          set -euo pipefail
          export HOME="${HOME:-/root}"
          mkdir -p "$HOME/.cache/unity3d" /github/workspace/artifacts /github/workspace/CodeCoverage

          # Activate license. Per Unity docs, -batchmode -quit -serial does NOT
          # require -projectPath. Adding it causes "Couldn't set project path"
          # when the dir is minimal. Omitting it works correctly.
          return_license() {
            unity-editor \
              -batchmode \
              -quit \
              -returnlicense \
              -username "$UNITY_EMAIL" \
              -password "$UNITY_PASSWORD" \
              -logFile /dev/stdout || true
          }
          trap return_license EXIT

          # Unity 2022 may exit with SIGTRAP (133) on shutdown after activation
          # even when activation succeeds. Allow non-zero exit and verify via log.
          ACTIVATE_LOG="$(mktemp)"
          unity-editor \
            -batchmode \
            -quit \
            -nographics \
            -serial "$UNITY_SERIAL" \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -logFile "${ACTIVATE_LOG}" || true
          cat "${ACTIVATE_LOG}"
          if ! grep -q "Successfully activated" "${ACTIVATE_LOG}"; then
            echo "::error::License activation failed — 'Successfully activated' not found in log."
            exit 1
          fi
          rm -f "${ACTIVATE_LOG}"

          # Remove stale Unity lockfile so unity-editor can open the project.
          # The Temp/ dir is gitignored but may be checked out from prior runs.
          rm -rf /github/workspace/Tools/ci/unity-project/Temp


          # Run the chained EditMode selections against the shadow project in one Unity process.
          unity-editor \
            -batchmode \
            -nographics \
            -logFile /github/workspace/artifacts/editmode.log \
            -projectPath Tools/ci/unity-project \
            -coverageResultsPath /github/workspace/CodeCoverage \
            -executeMethod ASMLite.Tests.Editor.ASMLiteBatchTestRunner.RunFromCommandLine \
            -enableCodeCoverage \
            -debugCodeOptimization \
            -coverageOptions "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;dontClear"
          RUNNER

          docker run --rm \
            --workdir /github/workspace \
            --env HOME=/root \
            --env UNITY_EMAIL \
            --env UNITY_PASSWORD \
            --env UNITY_SERIAL="${UNITY_SERIAL}" \
            --env ASMLITE_BATCH_RUNS_JSON \
            --env ASMLITE_BATCH_RESULTS_DIR \
            --volume "${GITHUB_WORKSPACE}:/github/workspace" \
            --volume "${RUNNER_SCRIPT}:/tmp/unity-runner.sh" \
            "${UNITY_IMAGE}" \
            /bin/bash /tmp/unity-runner.sh
          test -f artifacts/editmode-results.xml || {
            echo "::error::Missing canonical NUnit result file: artifacts/editmode-results.xml"
            exit 1
          }
          rm -f "${RUNNER_SCRIPT}"
      - name: Upload NUnit results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-results
          path: artifacts
