name: Lint

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions: {}

jobs:
  lint:
    name: Super-Linter
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Super-Linter
        uses: super-linter/super-linter/slim@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Validate all files on push to main/dev; only changed files on PRs
          VALIDATE_ALL_CODEBASE: ${{ github.event_name != 'pull_request' }}

          # Scope to files inside the package (ignore Test Project, Website, Logs)
          FILTER_REGEX_INCLUDE: .*(\.github|Packages/com\.staples\.asm-lite)/.*

          # Setting any VALIDATE_ to true makes all unset ones default to false.
          # Only list the linters relevant to this codebase.
          VALIDATE_MARKDOWN: true
          VALIDATE_JSON: true
          VALIDATE_YAML: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_GITLEAKS: true
