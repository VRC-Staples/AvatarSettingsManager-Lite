---
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      hotfix:
        type: boolean
        default: false
        description: "Rebuild and overwrite release at current version (artifact fix only -- does not bump version or notify VPM users)"

permissions: {}

jobs:

  setup:
    name: Version Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_release: ${{ steps.decide.outputs.should_release }}
      create_tag: ${{ steps.decide.outputs.create_tag }}
    env:
      IS_HOTFIX: "${{ inputs.hotfix || 'false' }}"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve version
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${{ vars.PACKAGE_NAME }}" ]; then
            echo "::error::PACKAGE_NAME variable is not set. Configure it in repo/org settings."
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          import pathlib

          package_path = pathlib.Path('Packages/com.staples.asm-lite/package.json')
          if not package_path.exists():
            raise SystemExit('Package manifest not found')
          try:
            data = json.loads(package_path.read_text())
          except json.JSONDecodeError as exc:
            raise SystemExit(f'Invalid package.json: {exc}')
          version = str(data.get('version', '')).strip()
          if not version:
            raise SystemExit('Package version is empty')
          output = os.environ['GITHUB_OUTPUT']
          with open(output, 'a') as fh:
            print(f'version={version}', file=fh)
          print(f'::notice::Resolved package version {version}')
          PY

      - name: Decide if we should release
        id: decide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import itertools
          import json
          import os
          import re
          import socket
          import sys
          import urllib.error
          import urllib.request

          is_hotfix = os.environ.get("IS_HOTFIX", "false").strip().lower() == "true"
          version = os.environ.get("VERSION", "").strip()
          repo = os.environ.get("GITHUB_REPOSITORY", "").strip()
          token = os.environ.get("GITHUB_TOKEN", "").strip()

          output = os.environ["GITHUB_OUTPUT"]

          if is_hotfix:
            print("::notice::Hotfix mode — overwriting artifacts for current version.")
            with open(output, "a") as fh:
              print("should_release=true", file=fh)
              print("create_tag=false", file=fh)
            sys.exit(0)

          # Compare package version against latest GitHub release
          try:
            version_parts = tuple(int(p) for p in version.split("."))
          except ValueError:
            raise SystemExit(f"Invalid semantic version: {version}")

          def normalize(parts, length):
            if len(parts) < length:
              return parts + (0,) * (length - len(parts))
            return parts

          url = f"https://api.github.com/repos/{repo}/releases/latest"
          req = urllib.request.Request(
            url,
            headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
            },
          )
          latest_version = ""
          latest_parts = ()
          try:
            with urllib.request.urlopen(req, timeout=20) as resp:
              data = json.loads(resp.read().decode("utf-8"))
            tag_name = data.get("tag_name", "").strip()
            semver_pattern = re.compile(r"^(?:v)?(\d+(?:\.\d+)*)$")
            match = semver_pattern.match(tag_name)
            if match:
              latest_version = tag_name
              latest_parts = tuple(int(p) for p in match.group(1).split("."))
          except urllib.error.HTTPError as exc:
            if exc.code == 404:
              print("::notice::No existing releases found — will create first release.")
            else:
              details = exc.read().decode("utf-8", errors="replace")
              print(f"::error::GitHub API HTTP {exc.code}: {details[:800]}")
              sys.exit(1)
          except (urllib.error.URLError, socket.timeout, TimeoutError) as exc:
            print(f"::error::GitHub API timeout or transport error: {exc}")
            sys.exit(1)

          should_release = False
          create_tag = False

          if not latest_parts:
            should_release = True
            create_tag = True
          else:
            max_length = max(len(version_parts), len(latest_parts))
            v_tuple = normalize(version_parts, max_length)
            l_tuple = normalize(latest_parts, max_length)
            comparison = 0
            for ours, theirs in zip(v_tuple, l_tuple):
              if ours != theirs:
                comparison = 1 if ours > theirs else -1
                break
            if comparison > 0:
              should_release = True
              create_tag = True
            else:
              print(f"::notice::Package version {version} is not newer than latest release {latest_version}. Skipping release.")

          with open(output, "a") as fh:
            print(f"should_release={'true' if should_release else 'false'}", file=fh)
            print(f"create_tag={'true' if create_tag else 'false'}", file=fh)
          if should_release:
            print(f"::notice::Will release version {version} (create_tag={create_tag})")
          PY

  gate:
    name: Release Gate
    needs: [setup]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      statuses: read
    steps:
      - name: Validate compile and lint checks for release SHA
        env:
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import socket
          import sys
          import urllib.error
          import urllib.request

          repo = os.environ.get("REPO", "").strip()
          sha = os.environ.get("TARGET_SHA", "").strip()
          token = os.environ.get("GITHUB_TOKEN", "").strip()

          if not repo:
            print("::error::Repository is empty; cannot evaluate checks.")
            sys.exit(1)
          if not sha:
            print("::error::Resolved SHA is empty; cannot evaluate checks.")
            sys.exit(1)
          if not token:
            print("::error::GITHUB_TOKEN is missing; cannot query commit checks.")
            sys.exit(1)

          required_checks = {
            "compile": [
              "CI / C# Compile (Unity 2022.3.22f1)",
              "C# Compile (Unity 2022.3.22f1)",
              "C# Compile Check / C# Compile (Unity 2022.3.22f1)",
            ],
            "lint": [
              "CI / Super-Linter",
              "Super-Linter",
              "Lint / Super-Linter",
            ],
            "test": [
              "CI / EditMode Tests",
              "EditMode Tests",
              "Unity Test Results / EditMode Tests",
            ],
          }

          def api_get(path, accept):
            url = f"https://api.github.com/repos/{repo}{path}"
            req = urllib.request.Request(
              url,
              headers={
                "Authorization": f"Bearer {token}",
                "Accept": accept,
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                body = resp.read().decode("utf-8")
            except urllib.error.HTTPError as exc:
              details = exc.read().decode("utf-8", errors="replace")
              print(f"::error::GitHub API HTTP {exc.code} for {path}: {details[:800]}")
              sys.exit(1)
            except (urllib.error.URLError, socket.timeout, TimeoutError) as exc:
              print(f"::error::GitHub API timeout or transport error for {path}: {exc}")
              sys.exit(1)

            try:
              return json.loads(body)
            except json.JSONDecodeError as exc:
              print(f"::error::Malformed JSON from {path}: {exc}")
              print(f"::error::Response prefix: {body[:800]}")
              sys.exit(1)

          import time

          max_wait_seconds = 1800
          poll_interval_seconds = 20

          pending_states = {
            "queued",
            "in_progress",
            "pending",
            "requested",
            "waiting",
          }

          def read_observed_checks():
            status_payload = api_get(
              f"/commits/{sha}/status",
              "application/vnd.github+json",
            )
            checks_payload = api_get(
              f"/commits/{sha}/check-runs?per_page=100",
              "application/vnd.github+json",
            )

            statuses = status_payload.get("statuses")
            if not isinstance(statuses, list):
              print("::error::Malformed commit status payload: missing statuses array.")
              sys.exit(1)

            check_runs = checks_payload.get("check_runs")
            if not isinstance(check_runs, list):
              print("::error::Malformed check-runs payload: missing check_runs array.")
              sys.exit(1)

            observed = {}

            for entry in statuses:
              context = entry.get("context")
              state = entry.get("state")
              if isinstance(context, str) and isinstance(state, str):
                observed[context] = state

            for run in check_runs:
              name = run.get("name")
              conclusion = run.get("conclusion")
              status = run.get("status")
              if not isinstance(name, str):
                continue
              if isinstance(conclusion, str):
                observed[name] = conclusion
              elif isinstance(status, str):
                observed[name] = status

            return observed

          def classify(observed):
            pending = []
            blocking = []

            for key, aliases in required_checks.items():
              matched_name = None
              matched_value = None
              for alias in aliases:
                val = observed.get(alias)
                if isinstance(val, str):
                  matched_name = alias
                  matched_value = val
                  break

              if matched_name is None:
                pending.append(f"waiting for required check for {key}: expected one of {aliases}")
                continue

              value = matched_value.strip().lower()
              if value == "success":
                continue

              if value in pending_states:
                pending.append(f"required check {matched_name} is {matched_value}")
              else:
                blocking.append(f"required check {matched_name} is {matched_value}, expected success")

            return pending, blocking

          print(f"Target SHA: {sha}")
          print("Required checks:")
          for key, aliases in required_checks.items():
            print(f"  {key}: {aliases[0]}")

          deadline = time.time() + max_wait_seconds
          attempt = 0

          while True:
            attempt += 1
            observed = read_observed_checks()

            print(f"Check poll attempt #{attempt}")
            print("Observed check conclusions:")
            if observed:
              for key in sorted(observed):
                print(f"  {key}: {observed[key]}")
            else:
              print("  <none>")

            pending, blocking = classify(observed)

            if not pending and not blocking:
              print("Gate passed: required compile, lint, and test checks are success for target SHA.")
              break

            if blocking:
              print("::error::Release gate blocked.")
              for reason in blocking:
                print(f"::error::{reason}")
              sys.exit(1)

            now = time.time()
            remaining = int(deadline - now)
            if remaining <= 0:
              print("::error::Release gate timed out waiting for required checks.")
              for reason in pending:
                print(f"::error::{reason}")
              sys.exit(1)

            sleep_for = poll_interval_seconds if remaining > poll_interval_seconds else remaining
            print(f"Pending checks still running; waiting {sleep_for}s ({remaining}s remaining).")
            time.sleep(sleep_for)
          PY

  build:
    name: Build & Publish
    needs: [setup, gate]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      packagePath: Packages/${{ vars.PACKAGE_NAME }}
      release_version: ${{ needs.setup.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set Environment Variables
        run: |
          echo "zipFile=${{ vars.PACKAGE_NAME }}-${{ env.release_version }}.zip" >> $GITHUB_ENV
          echo "unityPackage=${{ vars.PACKAGE_NAME }}-${{ env.release_version }}.unitypackage" >> $GITHUB_ENV
          echo "version=${{ env.release_version }}" >> $GITHUB_ENV

      - name: Create Package Zip
        working-directory: "${{ env.packagePath }}"
        run: zip -r "${{ github.workspace }}/${{ env.zipFile }}" .

      - name: Track Package Meta Files
        run: find "${{ env.packagePath }}/" -name \*.meta >> metaList

      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@b5c57408698b1fab8b3a84d4b67f767b8b7c0be9 # v1.2.3
        with:
          package-path: ${{ env.unityPackage }}
          include-files: metaList

      - name: Check for existing release tag
        if: needs.setup.outputs.create_tag == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.version }}
        run: |
          set -euo pipefail
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve package version for duplicate-tag guard."
            exit 1
          fi
          echo "Duplicate tag guard checking refs/tags/${TAG} for existing entries."
          api_url="https://api.github.com/repos/${{ github.repository }}/git/ref/tags/${TAG}"
          http_status=$(curl -s -o /tmp/tag-check.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "${api_url}")
          if [ "${http_status}" = "200" ]; then
            echo "::error::Duplicate tag guard (R061) blocked release because refs/tags/${TAG} already exists."
            cat /tmp/tag-check.json
            exit 1
          fi
          if [ "${http_status}" != "404" ]; then
            echo "::error::Unexpected HTTP ${http_status} checking ${api_url}."
            cat /tmp/tag-check.json
            exit 1
          fi

      - name: Create Tag
        if: needs.setup.outputs.create_tag == 'true'
        id: tag_version
        uses: rickstaa/action-create-tag@a1c7777fcb2fee4f19b0f283ba888afa11678b72 # v1
        with:
          tag: "${{ env.version }}"

      - name: Make Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            ${{ env.zipFile }}
            ${{ env.unityPackage }}
            ${{ env.packagePath }}/package.json
          tag_name: ${{ env.version }}

  listing:
    name: Deploy VPM Listing
    needs: [setup, build]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    concurrency:
      group: "pages"
      cancel-in-progress: true
    env:
      listPublishDirectory: Website
      pathToCi: ci
    steps:
      - name: Checkout Local Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout Automation Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: vrchat-community/package-list-action
          path: ${{ env.pathToCi }}
          clean: false

      - name: Restore Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ env.pathToCi }}/.nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj') }}

      - name: Build Package Version Listing
        run: >-
          ${{ env.pathToCi }}/build.cmd BuildRepoListing
          --root ${{ env.pathToCi }}
          --list-publish-directory $GITHUB_WORKSPACE/${{ env.listPublishDirectory }}
          --current-package-name ${{ vars.PACKAGE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ${{ env.listPublishDirectory }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
