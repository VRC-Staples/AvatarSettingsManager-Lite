---
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      hotfix:
        type: boolean
        default: false
        description: "Rebuild and overwrite release at current version (artifact fix only -- does not bump version or notify VPM users)"

permissions: {}

jobs:

  setup:
    name: Version Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_release: ${{ steps.decide.outputs.should_release }}
      create_tag: ${{ steps.decide.outputs.create_tag }}
    env:
      IS_HOTFIX: "${{ inputs.hotfix || 'false' }}"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve version
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${{ vars.PACKAGE_NAME }}" ]; then
            echo "::error::PACKAGE_NAME variable is not set. Configure it in repo/org settings."
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          import pathlib

          package_path = pathlib.Path('Packages/com.staples.asm-lite/package.json')
          if not package_path.exists():
            raise SystemExit('Package manifest not found')
          try:
            data = json.loads(package_path.read_text())
          except json.JSONDecodeError as exc:
            raise SystemExit(f'Invalid package.json: {exc}')
          version = str(data.get('version', '')).strip()
          if not version:
            raise SystemExit('Package version is empty')
          output = os.environ['GITHUB_OUTPUT']
          with open(output, 'a') as fh:
            print(f'version={version}', file=fh)
          print(f'::notice::Resolved package version {version}')
          PY

      - name: Decide if we should release
        id: decide
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import itertools
          import json
          import os
          import re
          import socket
          import sys
          import urllib.error
          import urllib.request

          is_hotfix = os.environ.get("IS_HOTFIX", "false").strip().lower() == "true"
          version = os.environ.get("VERSION", "").strip()
          repo = os.environ.get("GITHUB_REPOSITORY", "").strip()
          token = os.environ.get("GITHUB_TOKEN", "").strip()

          output = os.environ["GITHUB_OUTPUT"]

          if is_hotfix:
            print("::notice::Hotfix mode — overwriting artifacts for current version.")
            with open(output, "a") as fh:
              print("should_release=true", file=fh)
              print("create_tag=false", file=fh)
            sys.exit(0)

          # Compare package version against latest GitHub release
          try:
            version_parts = tuple(int(p) for p in version.split("."))
          except ValueError:
            raise SystemExit(f"Invalid semantic version: {version}")

          def normalize(parts, length):
            if len(parts) < length:
              return parts + (0,) * (length - len(parts))
            return parts

          url = f"https://api.github.com/repos/{repo}/releases/latest"
          req = urllib.request.Request(
            url,
            headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
            },
          )
          latest_version = ""
          latest_parts = ()
          try:
            with urllib.request.urlopen(req, timeout=20) as resp:
              data = json.loads(resp.read().decode("utf-8"))
            tag_name = data.get("tag_name", "").strip()
            semver_pattern = re.compile(r"^(?:v)?(\d+(?:\.\d+)*)$")
            match = semver_pattern.match(tag_name)
            if match:
              latest_version = tag_name
              latest_parts = tuple(int(p) for p in match.group(1).split("."))
          except urllib.error.HTTPError as exc:
            if exc.code == 404:
              print("::notice::No existing releases found — will create first release.")
            else:
              details = exc.read().decode("utf-8", errors="replace")
              print(f"::error::GitHub API HTTP {exc.code}: {details[:800]}")
              sys.exit(1)
          except (urllib.error.URLError, socket.timeout, TimeoutError) as exc:
            print(f"::error::GitHub API timeout or transport error: {exc}")
            sys.exit(1)

          should_release = False
          create_tag = False

          if not latest_parts:
            should_release = True
            create_tag = True
          else:
            max_length = max(len(version_parts), len(latest_parts))
            v_tuple = normalize(version_parts, max_length)
            l_tuple = normalize(latest_parts, max_length)
            comparison = 0
            for ours, theirs in zip(v_tuple, l_tuple):
              if ours != theirs:
                comparison = 1 if ours > theirs else -1
                break
            if comparison > 0:
              should_release = True
              create_tag = True
            else:
              print(f"::notice::Package version {version} is not newer than latest release {latest_version}. Skipping release.")

          with open(output, "a") as fh:
            print(f"should_release={'true' if should_release else 'false'}", file=fh)
            print(f"create_tag={'true' if create_tag else 'false'}", file=fh)
          if should_release:
            print(f"::notice::Will release version {version} (create_tag={create_tag})")
          PY

  gate:
    name: Release Gate
    needs: [setup]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      statuses: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify release gate invariants
        run: pwsh -File Tools/ci/verify-release-gate.ps1

      - name: Evaluate compatibility contract (enforced)
        run: |
          set -euo pipefail
          python3 Tools/ci/evaluate-compatibility-contract.py \
            --mode release \
            --contract compatibility.contract.json \
            --output-json /tmp/compatibility-contract-report.json \
            > /tmp/compatibility-contract-summary.md

      - name: Append compatibility summary
        if: always()
        run: |
          set -euo pipefail
          if [ -f /tmp/compatibility-contract-summary.md ]; then
            cat /tmp/compatibility-contract-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Compatibility Contract Evaluation" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Evaluator did not produce a markdown summary." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate compile and lint checks for release SHA
        env:
          TARGET_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 Tools/ci/check-required-statuses.py \
            --repo "${{ github.repository }}" \
            --sha "$TARGET_SHA" \
            --required-checks Tools/ci/release-required-checks.json \
            --github-token-env GITHUB_TOKEN \
            --max-wait-seconds 1800 \
            --poll-interval-seconds 20

  build:
    name: Build & Publish
    needs: [setup, gate]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      packagePath: Packages/${{ vars.PACKAGE_NAME }}
      release_version: ${{ needs.setup.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set Environment Variables
        run: |
          echo "zipFile=${{ vars.PACKAGE_NAME }}-${{ env.release_version }}.zip" >> $GITHUB_ENV
          echo "unityPackage=${{ vars.PACKAGE_NAME }}-${{ env.release_version }}.unitypackage" >> $GITHUB_ENV
          echo "version=${{ env.release_version }}" >> $GITHUB_ENV

      - name: Create Package Zip
        working-directory: "${{ env.packagePath }}"
        run: zip -r "${{ github.workspace }}/${{ env.zipFile }}" .

      - name: Track Package Meta Files
        run: find "${{ env.packagePath }}/" -name \*.meta >> metaList

      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@b5c57408698b1fab8b3a84d4b67f767b8b7c0be9 # v1.2.3
        with:
          package-path: ${{ env.unityPackage }}
          include-files: metaList

      - name: Check for existing release tag
        if: needs.setup.outputs.create_tag == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.version }}
        run: |
          set -euo pipefail
          if [ -z "${TAG}" ]; then
            echo "::error::Failed to resolve package version for duplicate-tag guard."
            exit 1
          fi
          echo "Duplicate tag guard checking refs/tags/${TAG} for existing entries."
          api_url="https://api.github.com/repos/${{ github.repository }}/git/ref/tags/${TAG}"
          http_status=$(curl -s -o /tmp/tag-check.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "${api_url}")
          if [ "${http_status}" = "200" ]; then
            echo "::error::Duplicate tag guard (R061) blocked release because refs/tags/${TAG} already exists."
            cat /tmp/tag-check.json
            exit 1
          fi
          if [ "${http_status}" != "404" ]; then
            echo "::error::Unexpected HTTP ${http_status} checking ${api_url}."
            cat /tmp/tag-check.json
            exit 1
          fi

      - name: Create Tag
        if: needs.setup.outputs.create_tag == 'true'
        id: tag_version
        uses: rickstaa/action-create-tag@a1c7777fcb2fee4f19b0f283ba888afa11678b72 # v1
        with:
          tag: "${{ env.version }}"

      - name: Make Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            ${{ env.zipFile }}
            ${{ env.unityPackage }}
            ${{ env.packagePath }}/package.json
          tag_name: ${{ env.version }}

  listing:
    name: Deploy VPM Listing
    needs: [setup, build]
    if: needs.setup.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    concurrency:
      group: "pages"
      cancel-in-progress: true
    env:
      listPublishDirectory: Website
      pathToCi: ci
    steps:
      - name: Checkout Local Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout Automation Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: vrchat-community/package-list-action
          path: ${{ env.pathToCi }}
          clean: false

      - name: Restore Cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ${{ env.pathToCi }}/.nuke/temp
            ~/.nuget/packages
          key: ${{ runner.os }}-${{ hashFiles('**/global.json', '**/*.csproj') }}

      - name: Build Package Version Listing
        run: >-
          ${{ env.pathToCi }}/build.cmd BuildRepoListing
          --root ${{ env.pathToCi }}
          --list-publish-directory $GITHUB_WORKSPACE/${{ env.listPublishDirectory }}
          --current-package-name ${{ vars.PACKAGE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ${{ env.listPublishDirectory }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
