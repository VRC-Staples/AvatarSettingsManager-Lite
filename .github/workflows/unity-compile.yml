---
name: C# Compile Check

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "Packages/com.staples.asm-lite/**/*.cs"
      - "ci/**"
      - ".github/workflows/unity-compile.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "Packages/com.staples.asm-lite/**/*.cs"
      - "ci/**"
      - ".github/workflows/unity-compile.yml"

permissions: {}

jobs:
  compile:
    name: C# Compile (Unity 2022.3.22f1)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "8.0.x"

      - name: Generate .csproj files
        env:
          UNITY_PATH: ci/unity-project/UnityManaged
          PACKAGE_PATH: Packages/com.staples.asm-lite
          CI_PROJECT_PATH: ci/unity-project
        run: |
          chmod +x ci/generate-csproj.sh
          ci/generate-csproj.sh

      - name: Compile assemblies
        run: |
          set +e
          cat ci/unity-project/ASMLite.Runtime.csproj > /tmp/runtime.csproj.txt
          dotnet build ci/unity-project/ASMLite.Runtime.csproj --nologo -v diagnostic > /tmp/runtime-build.txt 2>&1
          RT=$?
          echo "Runtime exit: $RT" >> /tmp/runtime-build.txt
          dotnet build ci/unity-project/ASMLite.Editor.csproj --nologo -v diagnostic > /tmp/editor-build.txt 2>&1
          ET=$?
          echo "Editor exit: $ET" >> /tmp/editor-build.txt
          # Print tail of each for annotations
          tail -50 /tmp/runtime-build.txt
          tail -50 /tmp/editor-build.txt
          exit $(( RT | ET ))

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs
          path: |
            /tmp/runtime.csproj.txt
            /tmp/runtime-build.txt
            /tmp/editor-build.txt
