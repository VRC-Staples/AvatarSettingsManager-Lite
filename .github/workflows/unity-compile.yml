---
name: C# Compile Check

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "Packages/com.staples.asm-lite/**/*.cs"
      - "ci/**"
      - ".github/workflows/unity-compile.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "Packages/com.staples.asm-lite/**/*.cs"
      - "ci/**"
      - ".github/workflows/unity-compile.yml"

permissions: { }

jobs:
  compile:
    name: C# Compile (Unity 2022.3.22f1)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Generate .csproj files
        env:
          UNITY_PATH: ci/unity-project/UnityManaged
          PACKAGE_PATH: Packages/com.staples.asm-lite
          CI_PROJECT_PATH: ci/unity-project
        run: |
          chmod +x ci/generate-csproj.sh
          ci/generate-csproj.sh

      - name: Verify generated csproj and reference DLLs
        run: |
          echo "=== ASMLite.Runtime.csproj ==="
          cat ci/unity-project/ASMLite.Runtime.csproj
          echo "=== DLL presence check ==="
          for dll in \
            ci/unity-project/UnityManaged/UnityEngine.dll \
            ci/unity-project/UnityManaged/UnityEditor.dll \
            ci/unity-project/Packages/com.vrchat.base/Runtime/VRCSDK/Plugins/VRCSDKBase.dll \
            ci/unity-project/Packages/com.vrchat.avatars/Runtime/VRCSDK/Plugins/VRCSDK3A.dll \
            ci/unity-project/Packages/com.vrchat.avatars/Runtime/VRCSDK/Plugins/VRCSDK3A-Editor.dll \
            ci/unity-project/Packages/com.vrchat.base/Runtime/VRCSDK/Plugins/VRC.Dynamics.dll; do
            if [ -f "$dll" ]; then echo "OK: $dll"; else echo "MISSING: $dll"; fi
          done

      - name: Compile runtime assembly
        run: >-
          dotnet build ci/unity-project/ASMLite.Runtime.csproj
          --nologo -v normal

      - name: Compile editor assembly
        run: >-
          dotnet build ci/unity-project/ASMLite.Editor.csproj
          --nologo -v normal
