# Unity EditMode test runner
#
# Required repo secrets:
#   UNITY_LICENSE   - raw .ulf file contents preferred; base64-wrapped .ulf accepted
#   UNITY_EMAIL     - Unity account email
#   UNITY_PASSWORD  - Unity account password
#
# Activation: serial is derived from UNITY_LICENSE and passed to unity-editor
# via -batchmode -quit -serial (no -projectPath required per Unity docs).
# Tests are run in a second unity-editor call with -projectPath.

name: Unity Test Results

on:
  push:
    branches: [main, dev]
    paths:
      - "Packages/com.staples.asm-lite/**"
      - "ci/unity-project/**"
      - "ci/verify-release-gate.ps1"
      - "ci/verify-shadow-project-hygiene.ps1"
      - "ci/generate-csproj.sh"
      - ".github/workflows/unity-test.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "Packages/com.staples.asm-lite/**"
      - "ci/unity-project/**"
      - "ci/verify-release-gate.ps1"
      - "ci/verify-shadow-project-hygiene.ps1"
      - "ci/generate-csproj.sh"
      - ".github/workflows/unity-test.yml"

permissions: {}

jobs:
  test:
    name: EditMode Tests
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Cache Unity Library
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ci/unity-project/Library
          key: Library-${{ hashFiles('ci/unity-project/Packages/**', 'ci/unity-project/ProjectSettings/**') }}
          restore-keys: Library-
      - name: Run EditMode Tests
        shell: bash
        env:
          UNITY_LICENSE_SECRET: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p artifacts CodeCoverage

          if [ -z "${UNITY_LICENSE_SECRET:-}" ]; then
            echo "::error::UNITY_LICENSE is missing."
            exit 1
          fi
          if [ -z "${UNITY_EMAIL:-}" ]; then
            echo "::error::UNITY_EMAIL is missing."
            exit 1
          fi
          if [ -z "${UNITY_PASSWORD:-}" ]; then
            echo "::error::UNITY_PASSWORD is missing."
            exit 1
          fi

          UNITY_VERSION="$(awk -F': ' '/^m_EditorVersion:/ { print $2; exit }' \
            ci/unity-project/ProjectSettings/ProjectVersion.txt)"
          if [ -z "${UNITY_VERSION:-}" ]; then
            echo "::error::Failed to read Unity version from ProjectVersion.txt"
            exit 1
          fi

          UNITY_IMAGE="unityci/editor:ubuntu-${UNITY_VERSION}-linux-il2cpp-3"
          echo "Using Unity image ${UNITY_IMAGE}"

          # Derive serial from the .ulf file (machine-independent — only the
          # DeveloperData base64 segment is used, not machine bindings).
          SERIAL_FILE="$(mktemp)"
          python - <<'PY' "$SERIAL_FILE"
          import base64, os, sys

          serial_path = sys.argv[1]
          secret = os.environ.get("UNITY_LICENSE_SECRET", "")

          def looks_like_ulf(v):
              return '<DeveloperData Value="' in v and '/>' in v

          norm = secret
          if not looks_like_ulf(secret):
              try:
                  dec = base64.b64decode(secret, validate=True).decode("utf-8")
              except Exception:
                  dec = ""
              if looks_like_ulf(dec):
                  norm = dec
                  print("::warning::UNITY_LICENSE was base64-decoded at runtime.")

          if not looks_like_ulf(norm):
              print("::error::UNITY_LICENSE is not a valid .ulf file.", file=sys.stderr)
              sys.exit(1)

          start_key = '<DeveloperData Value="'
          end_key = '"/>'
          s = norm.find(start_key)
          if s < 0:
              print("::error::Missing DeveloperData entry.", file=sys.stderr)
              sys.exit(1)
          s += len(start_key)
          e = norm.find(end_key, s)
          if e < 0:
              print("::error::Missing DeveloperData closing marker.", file=sys.stderr)
              sys.exit(1)

          serial = base64.b64decode(norm[s:e]).decode("latin1")[4:]
          if not serial:
              print("::error::Failed to derive serial.", file=sys.stderr)
              sys.exit(1)

          with open(serial_path, "w", encoding="utf-8") as fh:
              fh.write(serial)
          PY

          UNITY_SERIAL="$(tr -d '\r\n' < "${SERIAL_FILE}")"
          rm -f "${SERIAL_FILE}"

          if [ -z "${UNITY_SERIAL:-}" ]; then
            echo "::error::Failed to derive UNITY_SERIAL from UNITY_LICENSE"
            exit 1
          fi
          echo "::add-mask::${UNITY_SERIAL}"

          # Write the inner script to a temp file to avoid quoting issues
          # and shellcheck false-positives on the docker run string.
          RUNNER_SCRIPT="$(mktemp /tmp/unity-runner.XXXXXX.sh)"
          cat > "${RUNNER_SCRIPT}" <<'RUNNER'
          set -euo pipefail
          export HOME="${HOME:-/root}"
          mkdir -p "$HOME/.cache/unity3d" /github/workspace/artifacts /github/workspace/CodeCoverage

          # Activate license. Per Unity docs, -batchmode -quit -serial does NOT
          # require -projectPath. Adding it causes "Couldn't set project path"
          # when the dir is minimal. Omitting it works correctly.
          return_license() {
            unity-editor \
              -batchmode \
              -quit \
              -returnlicense \
              -username "$UNITY_EMAIL" \
              -password "$UNITY_PASSWORD" \
              -logFile /dev/stdout || true
          }
          trap return_license EXIT

          # Unity 2022 may exit with SIGTRAP (133) on shutdown after activation
          # even when activation succeeds. Allow non-zero exit and verify via log.
          ACTIVATE_LOG="$(mktemp)"
          unity-editor \
            -batchmode \
            -quit \
            -nographics \
            -serial "$UNITY_SERIAL" \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -logFile "${ACTIVATE_LOG}" || true
          cat "${ACTIVATE_LOG}"
          if ! grep -q "Successfully activated" "${ACTIVATE_LOG}"; then
            echo "::error::License activation failed — 'Successfully activated' not found in log."
            exit 1
          fi
          rm -f "${ACTIVATE_LOG}"

          # Remove stale Unity lockfile so unity-editor can open the project.
          # The Temp/ dir is gitignored but may be checked out from prior runs.
          rm -rf /github/workspace/ci/unity-project/Temp


          # Run tests against the shadow project.
          unity-editor \
            -nographics \
            -logFile /github/workspace/artifacts/editmode.log \
            -projectPath ci/unity-project \
            -coverageResultsPath /github/workspace/CodeCoverage \
            -runTests \
            -testPlatform editmode \
            -testResults /github/workspace/artifacts/editmode-results.xml \
            -enableCodeCoverage \
            -debugCodeOptimization \
            -coverageOptions "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;dontClear"
          RUNNER

          docker run --rm \
            --workdir /github/workspace \
            --env HOME=/root \
            --env UNITY_EMAIL \
            --env UNITY_PASSWORD \
            --env UNITY_SERIAL="${UNITY_SERIAL}" \
            --volume "${GITHUB_WORKSPACE}:/github/workspace" \
            --volume "${RUNNER_SCRIPT}:/tmp/unity-runner.sh" \
            "${UNITY_IMAGE}" \
            /bin/bash /tmp/unity-runner.sh
          rm -f "${RUNNER_SCRIPT}"
      - name: Upload NUnit results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-results
          path: artifacts
