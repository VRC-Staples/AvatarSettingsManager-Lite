# Unity EditMode test runner
#
# Required repo secrets:
#   UNITY_LICENSE   - raw .ulf file contents preferred; base64-wrapped .ulf accepted for legacy compatibility
#   UNITY_EMAIL     - Unity account email
#   UNITY_PASSWORD  - Unity account password
#
# The workflow normalizes UNITY_LICENSE, derives the serial locally, then runs the Unity editor container directly.
# Set these in Settings > Secrets and Variables > Actions before running.

name: Unity Test Results

on:
  push:
    branches: [main, dev]
    paths:
      - "Packages/com.staples.asm-lite/**"
      - "ci/unity-project/**"
      - "ci/verify-release-gate.ps1"
      - "ci/verify-shadow-project-hygiene.ps1"
      - "ci/generate-csproj.sh"
      - ".github/workflows/unity-test.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "Packages/com.staples.asm-lite/**"
      - "ci/unity-project/**"
      - "ci/verify-release-gate.ps1"
      - "ci/verify-shadow-project-hygiene.ps1"
      - "ci/generate-csproj.sh"
      - ".github/workflows/unity-test.yml"

permissions: {}

jobs:
  test:
    name: EditMode Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Cache Unity Library
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ci/unity-project/Library
          key: Library-${{ hashFiles('ci/unity-project/Packages/**', 'ci/unity-project/ProjectSettings/**') }}
          restore-keys: Library-
      - name: Normalize Unity license secret
        shell: bash
        env:
          UNITY_LICENSE_SECRET: ${{ secrets.UNITY_LICENSE }}
        run: |
          python - <<'PY'
          import base64
          import os
          import sys

          secret = os.environ.get("UNITY_LICENSE_SECRET", "")
          if not secret:
              print("::error::UNITY_LICENSE is missing. Provide raw .ulf contents. Base64-wrapped .ulf is accepted only for legacy compatibility.", file=sys.stderr)
              sys.exit(1)

          def looks_like_ulf(value: str) -> bool:
              return '<DeveloperData Value="' in value and '/>' in value

          normalized = secret
          mode = "raw"

          if not looks_like_ulf(secret):
              try:
                  decoded = base64.b64decode(secret, validate=True).decode("utf-8")
              except Exception:
                  decoded = ""
              if looks_like_ulf(decoded):
                  normalized = decoded
                  mode = "base64-decoded"

          if not looks_like_ulf(normalized):
              print("::error::UNITY_LICENSE does not look like a Unity .ulf file. Store the raw .ulf contents in the secret.", file=sys.stderr)
              sys.exit(1)

          print(f"UNITY_LICENSE format: {mode}")
          if mode == "base64-decoded":
              print("::warning::UNITY_LICENSE was base64-decoded at runtime. Store raw .ulf contents instead to avoid secret-format ambiguity.")

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as fh:
              fh.write("UNITY_LICENSE<<EOF\n")
              fh.write(normalized)
              fh.write("\nEOF\n")
          PY

      - name: Validate Unity activation inputs
        shell: bash
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if [ -z "${UNITY_LICENSE:-}" ]; then
            echo "::error::UNITY_LICENSE normalization did not produce a value."
            exit 1
          fi

          if [ -z "${UNITY_EMAIL:-}" ]; then
            echo "::error::UNITY_EMAIL is missing."
            exit 1
          fi

          if [ -z "${UNITY_PASSWORD:-}" ]; then
            echo "::error::UNITY_PASSWORD is missing."
            exit 1
          fi

          if [ -n "${UNITY_SERIAL:-}" ]; then
            echo "::warning::UNITY_SERIAL is set in repository secrets. This workflow ignores that secret and derives the activation serial from UNITY_LICENSE locally."
          fi

      - name: Run EditMode Tests
        shell: bash
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p artifacts CodeCoverage

          UNITY_VERSION="$(awk -F': ' '/^m_EditorVersion:/ { print $2; exit }' ci/unity-project/ProjectSettings/ProjectVersion.txt)"
          if [ -z "${UNITY_VERSION:-}" ]; then
            echo "::error::Failed to read Unity version from ci/unity-project/ProjectSettings/ProjectVersion.txt"
            exit 1
          fi

          UNITY_IMAGE="unityci/editor:ubuntu-${UNITY_VERSION}-linux-il2cpp-3"

          UNITY_SERIAL="$(python - <<'PY'
          import base64
          import os
          import sys

          license_text = os.environ.get("UNITY_LICENSE", "")
          start_key = '<DeveloperData Value="'
          end_key = '"/>'
          start = license_text.find(start_key)
          if start < 0:
              raise SystemExit("UNITY_LICENSE missing <DeveloperData Value=...> entry")
          start += len(start_key)
          end = license_text.find(end_key, start)
          if end < 0:
              raise SystemExit("UNITY_LICENSE missing closing DeveloperData marker")
          decoded = base64.b64decode(license_text[start:end]).decode('latin1')[4:]
          sys.stdout.write(decoded)
          PY
          )"

          if [ -z "${UNITY_SERIAL:-}" ]; then
            echo "::error::Failed to derive UNITY_SERIAL from UNITY_LICENSE"
            exit 1
          fi

          echo "::add-mask::${UNITY_SERIAL}"
          echo "Using Unity image ${UNITY_IMAGE}"

          docker run --rm \
            --workdir /github/workspace \
            --env UNITY_EMAIL \
            --env UNITY_PASSWORD \
            --env UNITY_SERIAL="${UNITY_SERIAL}" \
            --volume "${GITHUB_WORKSPACE}:/github/workspace" \
            "${UNITY_IMAGE}" \
            /bin/bash -lc '
              set -euo pipefail
              mkdir -p /tmp/BlankProject /github/workspace/artifacts /github/workspace/CodeCoverage
              return_license() {
                unity-editor \
                  -logFile /dev/stdout \
                  -quit \
                  -returnlicense \
                  -username "$UNITY_EMAIL" \
                  -password "$UNITY_PASSWORD" \
                  -projectPath /tmp/BlankProject || true
              }
              trap return_license EXIT
              unity-editor \
                -logFile /dev/stdout \
                -quit \
                -serial "$UNITY_SERIAL" \
                -username "$UNITY_EMAIL" \
                -password "$UNITY_PASSWORD" \
                -projectPath /tmp/BlankProject
              unity-editor \
                -logFile /github/workspace/artifacts/editmode.log \
                -projectPath ci/unity-project \
                -coverageResultsPath /github/workspace/CodeCoverage \
                -runTests \
                -testPlatform editmode \
                -testResults /github/workspace/artifacts/editmode-results.xml \
                -enableCodeCoverage \
                -debugCodeOptimization \
                -coverageOptions "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;dontClear"
            '
      - name: Upload NUnit results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-results
          path: artifacts
