---
extends: default

rules:
  document-start: disable
  line-length:
    max: 200
    level: warning
  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  comments:
    min-spaces-from-content: 1
  indentation:
    indent-sequences: whatever
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 0
